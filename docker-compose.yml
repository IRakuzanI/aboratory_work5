version: '3.8'

services:
  db:
    image: postgres:14-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    image: ghcr.io/irakuzani/backend:${TAG}
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - db

  frontend:
    image: ghcr.io/irakuzani/frontend:${TAG}
    environment:
      - WDS_SOCKET_PORT=0 

  nginx-proxy:
    image: nginx:alpine
    ports:
      - "8000:8080" 
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
  
  

